<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Letterpicks</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #14181c; --surface: #1c2228; --surface2: #242c36;
      --border: #2c3a47; --green: #00e054; --text: #e8e0d5;
      --muted: #7a8a94; --accent: #40bcf4; --warn: #f5a623;
      --nav-bg: rgba(20,24,28,0.92);
    }
    [data-theme="midnight"] {
      --bg: #0d1117; --surface: #161b22; --surface2: #1f2937;
      --border: #2d3748; --green: #58a6ff; --text: #e6edf3;
      --muted: #6e7681; --nav-bg: rgba(13,17,23,0.92);
    }
    [data-theme="crimson"] {
      --bg: #140d0d; --surface: #1f1212; --surface2: #2a1818;
      --border: #3d2020; --green: #ff6b6b; --text: #f0e0e0;
      --muted: #8a6a6a; --nav-bg: rgba(20,13,13,0.92);
    }
    [data-theme="light"] {
      --bg: #f5f2ea; --surface: #fffdf8; --surface2: #f0ece0;
      --border: #d8d1c2; --green: #00843d; --text: #1a1a1a;
      --muted: #6b6b6b; --nav-bg: rgba(245,242,234,0.95);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--green); text-decoration: none; }
    a:hover { opacity: 0.85; }

    .top-bar { display: flex; align-items: center; justify-content: flex-end; padding: 0.9rem 1.4rem; border-bottom: 1px solid var(--border); background: var(--nav-bg); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(8px); }
    .crosslink { font-size: 0.8rem; color: var(--muted); border: 1px solid var(--border); border-radius: 999px; padding: 0.4rem 0.9rem; transition: color 0.15s, border-color 0.15s; }
    .crosslink:hover { color: var(--text); border-color: var(--text); }
    .crosslink strong { color: var(--green); }

    .container { max-width: 860px; margin: 0 auto; padding: 3rem 1.5rem; }
    #upload-phase { display: flex; flex-direction: column; align-items: center; gap: 1.6rem; }
    .logo { color: var(--green); font-size: 2rem; font-weight: 700; letter-spacing: -1px; }
    .logo span { color: var(--text); font-weight: 300; }
    .tag { color: var(--muted); font-size: 0.9rem; margin-top: -0.7rem; text-align: center; max-width: 560px; line-height: 1.5; }

    .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; width: 100%; max-width: 700px; }
    .user-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 640px) { .user-grid, .user-grid.three { grid-template-columns: 1fr; } }
    .mode-tabs { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 0.25rem; }
    .mode-tab { background: none; border: none; color: var(--muted); font-size: 0.82rem; padding: 0.4rem 1rem; border-radius: 999px; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .mode-tab.active { background: var(--green); color: #0a0f0a; font-weight: 600; }
    .user-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1.1rem; display: flex; flex-direction: column; gap: 0.8rem; }
    .user-card h3 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .name-input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.6rem 0.85rem; color: var(--text); font-size: 0.9rem; outline: none; width: 100%;
      transition: border-color 0.2s;
    }
    .name-input:focus { border-color: var(--green); }
    .drop-zone {
      width: 100%; border: 2px dashed var(--border); border-radius: 12px;
      padding: 1.6rem 1rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.over { border-color: var(--green); background: rgba(0,224,84,0.04); }
    .drop-zone input { display: none; }
    .drop-zone .icon { font-size: 1.8rem; margin-bottom: 0.4rem; }
    .drop-zone p { color: var(--muted); font-size: 0.78rem; margin-top: 0.3rem; }
    .drop-zone strong { color: var(--text); font-size: 0.9rem; }
    .file-chosen { color: var(--green); font-size: 0.78rem; margin-top: 0.4rem; word-break: break-all; }

    .field-group { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 0.4rem; }
    .field-group label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .field-group input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.7rem 1rem; color: var(--text); font-size: 0.95rem; outline: none; width: 100%;
      transition: border-color 0.2s;
    }
    .field-group input:focus { border-color: var(--green); }
    .field-group small { color: var(--muted); font-size: 0.78rem; line-height: 1.5; }
    .field-group small code { background: var(--surface2); padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.85em; }

    .btn {
      background: var(--green); color: #0a0f0a; border: none; border-radius: 10px;
      padding: 0.85rem 2.5rem; font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s; letter-spacing: 0.01em;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.35; cursor: default; }

    #progress-phase { display: none; flex-direction: column; align-items: center; gap: 1.4rem; text-align: center; padding-top: 4rem; }
    .progress-label { color: var(--muted); font-size: 0.9rem; min-height: 1.2em; }
    .progress-bar-wrap { width: 100%; max-width: 420px; height: 6px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.3s; width: 0%; }
    .progress-title { font-size: 1.1rem; color: var(--text); }

    #report-phase { display: none; }
    .report-container { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
    .rep-header { display: flex; align-items: baseline; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
    .rep-header h1 { font-size: 1.8rem; color: var(--green); letter-spacing: -0.5px; }
    .rep-header .meta { color: var(--muted); font-size: 0.85rem; }
    .back-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.8rem; cursor: pointer; margin-left: auto; }
    .back-btn:hover { border-color: var(--text); color: var(--text); }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 2.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1rem; text-align: center; }
    .stat-card .val { font-size: 2rem; font-weight: 700; color: var(--green); line-height: 1.1; }
    .stat-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.3rem; }

    .section { margin-bottom: 2.5rem; }
    .section h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
    .section-note { color: var(--muted); font-size: 0.84rem; line-height: 1.5; margin-bottom: 1rem; }

    .pick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .pick-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.15s, border-color 0.15s; }
    .pick-card:hover { transform: translateY(-2px); border-color: var(--green); }
    .pick-card .poster-wrap { aspect-ratio: 2/3; background: var(--surface2); position: relative; overflow: hidden; }
    .pick-card .poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pick-card .poster-wrap .rank-badge { position: absolute; top: 0.5rem; left: 0.5rem; background: var(--green); color: #0a0f0a; font-weight: 700; font-size: 0.85rem; padding: 0.2rem 0.55rem; border-radius: 999px; }
    .pick-card .body { padding: 0.8rem 0.9rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .pick-card .title { font-size: 0.95rem; color: var(--text); font-weight: 600; line-height: 1.25; }
    .pick-card .year { font-size: 0.78rem; color: var(--muted); }
    .pick-card .scores { display: flex; gap: 0.6rem; font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; flex-wrap: wrap; }
    .pick-card .scores .score-pill { background: var(--surface2); border-radius: 999px; padding: 0.15rem 0.6rem; }
    .pick-card .scores .score-pill .star { color: var(--green); }
    .pick-card .reason { font-size: 0.78rem; color: var(--muted); line-height: 1.4; margin-top: 0.3rem; }
    .pick-card .lb-link { font-size: 0.78rem; margin-top: 0.4rem; }

    .shared-list { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.4rem 1rem; }
    .shared-row { display: flex; align-items: center; gap: 0.7rem; padding: 0.55rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .shared-row:last-child { border-bottom: none; }
    .shared-row .rank { color: var(--muted); font-size: 0.75rem; min-width: 1.8rem; }
    .shared-row .title { flex: 1; color: var(--text); }
    .shared-row .year { color: var(--muted); font-size: 0.8rem; }
    .shared-row .tags { color: var(--muted); font-size: 0.76rem; }
    .shared-row a { font-size: 0.78rem; }

    .empty { color: var(--muted); font-size: 0.9rem; padding: 1rem 0; text-align: center; }
    .err { color: var(--warn); font-size: 0.85rem; margin-top: 0.5rem; }

    .filters { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1rem; align-items: center; }
    .filter-group { display: flex; align-items: center; gap: 0.4rem; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 0.35rem 0.8rem; font-size: 0.78rem; color: var(--muted); }
    .filter-group label { color: var(--muted); }
    .filter-group select { background: transparent; color: var(--text); border: none; font-size: 0.8rem; outline: none; cursor: pointer; }
    .filter-group select option { background: var(--surface); color: var(--text); }
    .filter-clear { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 999px; padding: 0.35rem 0.8rem; font-size: 0.78rem; cursor: pointer; }
    .filter-clear:hover { color: var(--text); border-color: var(--text); }
    .filter-count { color: var(--muted); font-size: 0.78rem; margin-left: auto; }

    .palette-picker { display: flex; gap: 0.4rem; align-items: center; padding: 0 0.4rem; margin-left: auto; }
    .palette-swatch { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s, transform 0.15s; }
    .palette-swatch:hover, .palette-swatch.active { border-color: var(--text); transform: scale(1.2); }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="palette-picker">
    <div class="palette-swatch active" data-theme="" style="background:#00e054" title="Emerald"></div>
    <div class="palette-swatch" data-theme="midnight" style="background:#58a6ff" title="Midnight"></div>
    <div class="palette-swatch" data-theme="crimson" style="background:#ff6b6b" title="Crimson"></div>
    <div class="palette-swatch" data-theme="light" style="background:#00843d;border-color:#ccc" title="Light"></div>
  </div>
  <a class="crosslink" href="https://letterstats.ndblake.com" target="_blank" rel="noopener">← <strong>Letterstats</strong></a>
</div>

<div class="container" id="upload-phase">
  <div class="logo">Letterpicks</div>
  <div class="tag" id="tag-line"></div>

  <div class="mode-tabs" id="mode-tabs">
    <button class="mode-tab" data-mode="1">1 person</button>
    <button class="mode-tab active" data-mode="2">2 people</button>
    <button class="mode-tab" data-mode="3">3 people</button>
  </div>

  <div class="user-grid" id="user-grid"></div>

  <div class="field-group">
    <label>How to get your export</label>
    <small>On Letterboxd go to <strong>Settings → Data → Export Your Data</strong> — you'll get a <code>.zip</code> file. Drop one ZIP in each slot above.</small>
  </div>

  <button class="btn" id="generate-btn" disabled>Generate Picks</button>
  <p class="err" id="upload-err"></p>
</div>

<div class="container" id="progress-phase">
  <div class="progress-title" id="progress-title">Working…</div>
  <div class="progress-label" id="progress-label"></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>
</div>

<div id="report-phase">
  <div class="report-container">
    <div class="rep-header">
      <h1>Letterpicks</h1>
      <span class="meta" id="report-meta"></span>
      <button class="back-btn" onclick="reset()">← New Picks</button>
    </div>
    <div class="stat-grid" id="stat-grid"></div>

    <div class="section">
      <h2 id="primary-section-title">Top Picks</h2>
      <div class="section-note" id="primary-section-note"></div>
      <div class="filters" id="filters"></div>
      <div id="picks-area"></div>
    </div>

    <div class="section" id="group-discovery-section" style="display:none;">
      <h2 id="group-discovery-title">More Group Picks</h2>
      <div class="section-note" id="group-discovery-note"></div>
      <div id="group-discovery-area"></div>
    </div>

    <div class="section" id="favorites-section" style="display:none;">
      <h2 id="favorites-title">Favorites To Borrow</h2>
      <div class="section-note" id="favorites-note"></div>
      <div id="favorites-area"></div>
    </div>

    <div class="section">
      <h2 id="library-section-title">Library</h2>
      <div class="section-note" id="library-section-note"></div>
      <div id="shared-list-area"></div>
    </div>
  </div>
</div>

<script>
const THEME_KEY = 'lp_theme_v1';
const savedTheme = localStorage.getItem(THEME_KEY) || '';
if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
document.querySelectorAll('.palette-swatch').forEach(s => {
  if ((s.dataset.theme || '') === savedTheme) {
    document.querySelectorAll('.palette-swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
  }
  s.addEventListener('click', () => {
    const t = s.dataset.theme || '';
    if (t) document.documentElement.setAttribute('data-theme', t);
    else document.documentElement.removeAttribute('data-theme');
    localStorage.setItem(THEME_KEY, t);
    document.querySelectorAll('.palette-swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
  });
});

const SLOT_LABELS = ['User A', 'User B', 'User C'];
const SLOT_PLACEHOLDERS = ['Name (e.g. Noah)', 'Name (e.g. Sam)', 'Name (e.g. Alex)'];
const MODE_COPY = {
  1: {
    tag: "Drop in one Letterboxd export ZIP and we'll look at what you've loved before, what you still haven't watched, and what you'd probably like next.",
    button: 'Find My Picks',
  },
  2: {
    tag: "Drop in two Letterboxd export ZIPs and we'll find what's in both your watchlists — then rank what you'd both enjoy most.",
    button: 'Find Our Picks',
  },
  3: {
    tag: "Drop in three Letterboxd export ZIPs and we'll find what's in all your watchlists — then rank what you'd all enjoy most.",
    button: 'Find Our Picks',
  },
};
let MODE = 2;
const files = [null, null, null];
const names = ['', '', ''];

function buildUserGrid() {
  const grid = document.getElementById('user-grid');
  grid.classList.toggle('three', MODE === 3);
  grid.innerHTML = '';
  for (let i = 0; i < MODE; i++) {
    const card = document.createElement('div');
    card.className = 'user-card';
    card.innerHTML = `
      <h3>${SLOT_LABELS[i]}</h3>
      <input class="name-input" data-slot-name="${i}" placeholder="${SLOT_PLACEHOLDERS[i]}" autocomplete="off" value="${escapeHtml(names[i] || '')}" />
      <div class="drop-zone" data-slot="${i}">
        <input type="file" accept=".zip" />
        <div class="icon">🎬</div>
        <strong>Drop ZIP here</strong>
        <p>or click to browse</p>
        <p class="file-chosen">${files[i] ? '✓ ' + escapeHtml(files[i].name) : ''}</p>
      </div>`;
    grid.appendChild(card);
  }
  grid.querySelectorAll('.drop-zone').forEach(z => {
    const slot = parseInt(z.dataset.slot, 10);
    const input = z.querySelector('input');
    const chosen = z.querySelector('.file-chosen');
    z.addEventListener('click', e => { if (e.target.tagName !== 'INPUT') input.click(); });
    z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('over'); });
    z.addEventListener('dragleave', () => z.classList.remove('over'));
    z.addEventListener('drop', e => {
      e.preventDefault();
      z.classList.remove('over');
      const f = e.dataTransfer.files[0];
      if (f && f.name.endsWith('.zip')) {
        files[slot] = f;
        chosen.textContent = '✓ ' + f.name;
        checkReady();
      }
    });
    input.addEventListener('change', () => {
      if (input.files[0]) {
        files[slot] = input.files[0];
        chosen.textContent = '✓ ' + input.files[0].name;
        checkReady();
      }
    });
  });
  grid.querySelectorAll('input[data-slot-name]').forEach(inp => {
    inp.addEventListener('input', () => {
      names[parseInt(inp.dataset.slotName, 10)] = inp.value;
      checkReady();
    });
  });
  document.getElementById('tag-line').textContent = MODE_COPY[MODE].tag;
  document.getElementById('generate-btn').textContent = MODE_COPY[MODE].button;
  checkReady();
}

document.querySelectorAll('.mode-tab').forEach(t => {
  t.addEventListener('click', () => {
    MODE = parseInt(t.dataset.mode, 10);
    document.querySelectorAll('.mode-tab').forEach(x => x.classList.toggle('active', x === t));
    buildUserGrid();
  });
});
buildUserGrid();

const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI0OWVhMTczNmQ5NzRkNDkzNTA2MzhhZjk2MjQxMzhiZCIsIm5iZiI6MTc3NzMyMjU2NS41NzQwMDAxLCJzdWIiOiI2OWVmY2E0NWVmYjA0YjNlNzAyOTk5NjkiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.CBvA4k58mRoH2IE347CM-1IuvOm--wTp8L2_IPce3Vc';

function checkReady() {
  let ok = true;
  for (let i = 0; i < MODE; i++) if (!files[i]) ok = false;
  document.getElementById('generate-btn').disabled = !ok;
}

document.getElementById('generate-btn').addEventListener('click', () => run().catch(e => {
  console.error(e);
  document.getElementById('upload-err').textContent = 'Error: ' + (e.message || e);
  document.getElementById('upload-phase').style.display = '';
  document.getElementById('progress-phase').style.display = 'none';
}));

function reset() {
  for (let i = 0; i < 3; i++) { files[i] = null; names[i] = ''; }
  buildUserGrid();
  document.getElementById('upload-err').textContent = '';
  document.getElementById('generate-btn').disabled = true;
  document.getElementById('upload-phase').style.display = '';
  document.getElementById('progress-phase').style.display = 'none';
  document.getElementById('report-phase').style.display = 'none';
}

function showProgress(title, label, pct) {
  document.getElementById('progress-title').textContent = title;
  document.getElementById('progress-label').textContent = label || '';
  document.getElementById('progress-bar').style.width = (pct || 0) + '%';
}

function norm(k) { return k.trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, ''); }
function firstVal(row, aliases) { for (const a of aliases) if (row[a]) return row[a]; return null; }
function parseRating(raw) {
  if (!raw) return null;
  raw = String(raw).trim();
  if (/^\d+(\.\d+)?$/.test(raw)) return parseFloat(raw);
  if (/^[★½]+$/.test(raw)) {
    let v = 0;
    for (const c of raw) v += c === '★' ? 1 : 0.5;
    return v;
  }
  return null;
}

async function readZip(file) {
  const zip = await JSZip.loadAsync(file);
  const out = { ratings: [], watchlist: [], diary: [] };
  for (const name of Object.keys(zip.files)) {
    const lower = name.toLowerCase();
    if (lower.endsWith('ratings.csv')) out.ratings = await parseCSV(zip.files[name]);
    else if (lower.endsWith('watchlist.csv')) out.watchlist = await parseCSV(zip.files[name]);
    else if (lower.endsWith('diary.csv')) out.diary = await parseCSV(zip.files[name]);
  }
  return out;
}

async function parseCSV(zipEntry) {
  const text = await zipEntry.async('string');
  return new Promise(resolve => {
    Papa.parse(text, { header: true, skipEmptyLines: true, complete: r => resolve(r.data) });
  });
}

function normalizeRows(rows) {
  return rows.map(raw => {
    const row = {};
    for (const k in raw) row[norm(k)] = (raw[k] == null ? '' : String(raw[k])).trim();
    return {
      title: firstVal(row, ['name', 'title', 'film', 'film_name', 'movie']) || '',
      year: parseInt(firstVal(row, ['year', 'release_year']), 10) || null,
      uri: firstVal(row, ['letterboxd_uri', 'letterboxd_url', 'uri', 'url']) || '',
      rating: parseRating(firstVal(row, ['rating', 'your_rating', 'stars'])),
      watchedOn: firstVal(row, ['watched_date', 'date', 'watched_on']) || '',
    };
  }).filter(r => r.title);
}

function makeKey(r) {
  return (r.title || '').toLowerCase() + '|' + (r.year || '');
}

const TMDB = 'https://api.themoviedb.org/3';
const POSTER_BASE = 'https://image.tmdb.org/t/p/w342';
const TMDB_CACHE_KEY = 'lp_tmdb_cache_v5';
function loadTmdbCache() { try { return JSON.parse(localStorage.getItem(TMDB_CACHE_KEY) || '{}'); } catch { return {}; } }
function saveTmdbCache(c) { try { localStorage.setItem(TMDB_CACHE_KEY, JSON.stringify(c)); } catch {} }

async function tmdbGet(path, params) {
  const qs = Object.keys(params).length ? '?' + new URLSearchParams(params) : '';
  const res = await fetch(TMDB + path + qs, {
    headers: { Authorization: 'Bearer ' + TMDB_TOKEN, Accept: 'application/json' },
  });
  if (!res.ok) throw new Error('TMDB ' + res.status + ' on ' + path);
  return res.json();
}

async function tmdbSearch(title, year, cache) {
  const ck = 'search:' + title.toLowerCase() + '|' + (year || '');
  if (Object.prototype.hasOwnProperty.call(cache, ck)) return cache[ck];
  const params = { query: title };
  if (year) params.year = year;
  const data = await tmdbGet('/search/movie', params);
  const hit = (data.results && data.results[0]) || null;
  cache[ck] = hit ? { id: hit.id, title: hit.title, year: (hit.release_date || '').slice(0, 4), poster: hit.poster_path } : null;
  return cache[ck];
}

async function tmdbDetails(id, cache) {
  const ck = 'details:' + id;
  if (cache[ck]) return cache[ck];
  const data = await tmdbGet('/movie/' + id, { append_to_response: 'similar,release_dates' });
  let cert = null;
  const usEntry = ((data.release_dates && data.release_dates.results) || []).find(r => r.iso_3166_1 === 'US');
  if (usEntry) {
    const withCert = (usEntry.release_dates || []).find(d => d.certification && d.certification.trim());
    if (withCert) cert = withCert.certification.trim();
  }
  cache[ck] = {
    runtime: data.runtime || null,
    certification: cert,
    genres: (data.genres || []).map(g => g.name),
    similar: ((data.similar && data.similar.results) || []).map(m => ({
      id: m.id,
      title: m.title,
      year: parseInt((m.release_date || '').slice(0, 4), 10) || null,
      poster: m.poster_path || null,
    })),
  };
  return cache[ck];
}

let lastReq = 0;
async function throttled(fn) {
  const wait = Math.max(0, 33 - (Date.now() - lastReq));
  if (wait) await new Promise(r => setTimeout(r, wait));
  lastReq = Date.now();
  return fn();
}

function buildRatedIndex(rows) {
  const idx = new Map();
  for (const r of rows) {
    if (r.rating == null) continue;
    idx.set((r.title || '').toLowerCase() + '|' + (r.year || ''), r.rating);
  }
  return idx;
}

function buildWatchedSet(user) {
  const set = new Set();
  [...user.ratings, ...user.diary].forEach(r => set.add(makeKey(r)));
  return set;
}

function buildWatchlistMap(rows) {
  const map = new Map();
  rows.forEach(r => map.set(makeKey(r), r));
  return map;
}

function userAvg(ratings) {
  if (!ratings.length) return null;
  return ratings.reduce((a, b) => a + b, 0) / ratings.length;
}

function fallbackAvg(avg) {
  return avg == null ? 3.25 : avg;
}

function isUnseenByAll(key, watchedSets) {
  for (const watched of watchedSets) if (watched.has(key)) return false;
  return true;
}

function harmonicN(vals) {
  if (!vals.length || vals.some(v => v == null)) return null;
  if (vals.some(v => v <= 0)) return 0;
  const sumRecip = vals.reduce((s, v) => s + 1 / v, 0);
  return vals.length / sumRecip;
}

function mean(vals) {
  if (!vals.length) return 0;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}

function buildSharedWatchlist(users) {
  if (!users.length) return [];
  let sharedKeys = new Map(users[0].watchlist.map(r => [makeKey(r), r]));
  for (let i = 1; i < users.length; i++) {
    const next = new Map();
    const wMap = new Map(users[i].watchlist.map(r => [makeKey(r), r]));
    for (const [k, r] of sharedKeys) if (wMap.has(k)) next.set(k, r);
    sharedKeys = next;
  }
  return [...sharedKeys.entries()].map(([key, r]) => ({
    key,
    title: r.title,
    year: r.year,
    uri: r.uri,
    sourceType: 'shared-watchlist',
    supportCount: users.length,
    watchOwners: users.map((_, idx) => idx),
  }));
}

function buildUnionWatchlistCandidates(users, watchedSets, excludeKeys, mode) {
  const union = new Map();
  users.forEach((user, idx) => {
    user.watchlist.forEach(r => {
      const key = makeKey(r);
      if (!union.has(key)) {
        union.set(key, {
          key,
          title: r.title,
          year: r.year,
          uri: r.uri,
          sourceType: 'watchlist-union',
          supportCount: 0,
          watchOwners: [],
        });
      }
      const entry = union.get(key);
      if (!entry.watchOwners.includes(idx)) entry.watchOwners.push(idx);
      entry.supportCount = entry.watchOwners.length;
      if (!entry.uri && r.uri) entry.uri = r.uri;
    });
  });

  const candidates = [...union.values()].filter(entry => {
    if (excludeKeys.has(entry.key)) return false;
    if (mode > 1 && entry.supportCount === mode) return false;
    return isUnseenByAll(entry.key, watchedSets);
  });

  candidates.sort((a, b) => {
    if (b.supportCount !== a.supportCount) return b.supportCount - a.supportCount;
    return (a.title || '').localeCompare(b.title || '');
  });
  return candidates;
}

function pickSeedMovies(user, avg) {
  const rated = user.ratings.filter(r => r.rating != null);
  rated.sort((a, b) => (b.rating - a.rating) || ((a.title || '').localeCompare(b.title || '')));
  const threshold = Math.max(4, fallbackAvg(avg) + 0.35);
  const seeds = rated.filter(r => r.rating >= threshold).slice(0, 6);
  return seeds.length ? seeds : rated.slice(0, 4);
}

function mergeSimilarCandidate(map, movie, ownerIndex, ownerName, sourceSeed) {
  const key = 'tmdb:' + movie.id;
  if (!map.has(key)) {
    map.set(key, {
      key,
      tmdbId: movie.id,
      title: movie.title,
      year: movie.year,
      poster: movie.poster || null,
      uri: '',
      sourceType: 'tmdb-similar',
      supportCount: 0,
      supportUsers: new Set(),
      similarSources: [],
      watchOwners: [],
    });
  }
  const entry = map.get(key);
  if (!entry.supportUsers.has(ownerIndex)) {
    entry.supportUsers.add(ownerIndex);
    entry.supportCount += 1;
  }
  entry.similarSources.push({ ownerIndex, ownerName, title: sourceSeed.title, year: sourceSeed.year });
}

async function buildSimilarFallbackCandidates(users, userModels, cache, mode) {
  const map = new Map();
  const allWatched = new Set();
  users.forEach(user => user.watchedSet.forEach(k => allWatched.add(k)));
  for (let i = 0; i < users.length; i++) {
    const seeds = pickSeedMovies(users[i], userModels[i].avg);
    for (const seed of seeds) {
      let hit = null;
      try {
        hit = await throttled(() => tmdbSearch(seed.title, seed.year, cache));
      } catch (e) {
        console.warn('seed search failed', seed.title, e);
      }
      if (!hit) continue;
      let details = null;
      try {
        details = await throttled(() => tmdbDetails(hit.id, cache));
      } catch (e) {
        console.warn('seed details failed', seed.title, e);
      }
      if (!details) continue;
      for (const similar of details.similar.slice(0, 10)) {
        const syntheticKey = (similar.title || '').toLowerCase() + '|' + (similar.year || '');
        if (allWatched.has(syntheticKey)) continue;
        mergeSimilarCandidate(map, similar, i, users[i].name, seed);
      }
    }
  }
  const candidates = [...map.values()].filter(entry => entry.supportCount >= Math.min(mode, 1));
  candidates.sort((a, b) => {
    if (b.supportCount !== a.supportCount) return b.supportCount - a.supportCount;
    return (a.title || '').localeCompare(b.title || '');
  });
  return candidates.slice(0, mode === 1 ? 36 : 28).map(entry => ({
    ...entry,
    supportUsers: undefined,
  }));
}

function buildFavoriteHandoffCandidates(users, userModels) {
  if (users.length !== 2) return [];
  const out = new Map();
  for (let sourceIdx = 0; sourceIdx < users.length; sourceIdx++) {
    const targetIdx = sourceIdx === 0 ? 1 : 0;
    const source = users[sourceIdx];
    const target = users[targetIdx];
    const threshold = Math.max(4, userModels[sourceIdx].avg + 0.35);
    source.ratings.forEach(row => {
      const key = makeKey(row);
      if (row.rating == null || row.rating < threshold) return;
      if (!key || target.watchedSet.has(key)) return;
      const existing = out.get(key);
      if (existing && existing.sourceRating >= row.rating) return;
      out.set(key, {
        key,
        title: row.title,
        year: row.year,
        uri: row.uri,
        sourceType: 'friend-favorite',
        sourceOwner: sourceIdx,
        targetOwner: targetIdx,
        sourceRating: row.rating,
        supportCount: 1,
        watchOwners: target.watchlistMap.has(key) ? [targetIdx] : [],
      });
    });
  }
  return [...out.values()].sort((a, b) => {
    if (b.sourceRating !== a.sourceRating) return b.sourceRating - a.sourceRating;
    return (a.title || '').localeCompare(b.title || '');
  });
}

async function enrichCandidates(candidates, cache, progressBase, progressSpan, titlePrefix) {
  const enriched = [];
  for (let i = 0; i < candidates.length; i++) {
    const candidate = candidates[i];
    const label = candidate.title + (candidate.year ? ' (' + candidate.year + ')' : '');
    showProgress(titlePrefix, label, progressBase + Math.floor(progressSpan * (i / Math.max(candidates.length, 1))));
    let hit = null;
    if (candidate.tmdbId) {
      hit = { id: candidate.tmdbId, poster: candidate.poster || null };
    } else {
      try {
        hit = await throttled(() => tmdbSearch(candidate.title, candidate.year, cache));
      } catch (e) {
        console.warn('candidate search failed', candidate.title, e);
      }
    }
    if (!hit) {
      enriched.push({ ...candidate, tmdbId: null, poster: null, similar: [], runtime: null, certification: null, genres: [] });
      continue;
    }
    let details = { runtime: null, certification: null, genres: [], similar: [] };
    try {
      details = await throttled(() => tmdbDetails(hit.id, cache));
    } catch (e) {
      console.warn('candidate details failed', candidate.title, e);
    }
    enriched.push({
      ...candidate,
      tmdbId: hit.id,
      poster: candidate.poster || hit.poster || null,
      runtime: details.runtime,
      certification: details.certification,
      genres: details.genres,
      similar: details.similar,
    });
  }
  return enriched;
}

function scoreCandidate(candidate, users, userModels, mode) {
  const perUser = users.map((user, idx) => predictForUser(candidate, user, userModels[idx]));
  const scores = perUser.map(p => p.score);
  const harmonic = harmonicN(scores) || 0;
  const spread = scores.length > 1 ? (Math.max(...scores) - Math.min(...scores)) : 0;
  const agreementFactor = Math.max(0.6, 1 - spread / 6);
  const confidence = mean(perUser.map(p => p.confidence));
  const supportBoost = candidate.sourceType === 'watchlist-union' ? 0.15 * (candidate.supportCount / Math.max(mode, 1)) : 0;
  const finalScore = harmonic * agreementFactor + confidence * 0.12 + supportBoost;
  return {
    ...candidate,
    preds: perUser.map(p => p.score),
    matched: perUser.map(p => p.matched),
    predictionMeta: perUser,
    harmonic,
    agreementFactor,
    confidence,
    finalScore,
  };
}

function scoreFavoriteCandidate(candidate, users, userModels) {
  const targetMeta = predictForUser(candidate, users[candidate.targetOwner], userModels[candidate.targetOwner]);
  const watchBonus = candidate.watchOwners.includes(candidate.targetOwner) ? 0.12 : 0;
  const sourceBonus = candidate.sourceRating * 0.22;
  const finalScore = targetMeta.score * 0.9 + sourceBonus + targetMeta.confidence * 0.1 + watchBonus;
  return {
    ...candidate,
    predictionMeta: [targetMeta],
    preds: [candidate.sourceRating, targetMeta.score],
    matched: [targetMeta.matched],
    confidence: targetMeta.confidence,
    finalScore,
  };
}

function predictForUser(candidate, user, model) {
  const matches = [];
  for (const similar of candidate.similar || []) {
    const key = (similar.title || '').toLowerCase() + '|' + (similar.year || '');
    const rating = model.ratedIdx.get(key);
    if (rating != null) matches.push({ title: similar.title, year: similar.year, rating });
  }
  matches.sort((a, b) => b.rating - a.rating);
  const prior = model.avg;
  if (!matches.length) {
    return { score: prior, matched: [], confidence: 0, basis: 'average' };
  }
  const topMatches = matches.slice(0, 6);
  const matchAvg = userAvg(topMatches.map(m => m.rating)) || prior;
  const score = (matchAvg * topMatches.length + prior * 2) / (topMatches.length + 2);
  return {
    score,
    matched: topMatches,
    confidence: Math.min(1, topMatches.length / 4),
    basis: 'similar',
  };
}

function dedupeScored(scored, limit) {
  const seen = new Set();
  const out = [];
  for (const item of scored) {
    const key = item.tmdbId ? 'tmdb:' + item.tmdbId : item.key;
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(item);
    if (limit && out.length >= limit) break;
  }
  return out;
}

async function run() {
  document.getElementById('upload-err').textContent = '';
  document.getElementById('upload-phase').style.display = 'none';
  document.getElementById('progress-phase').style.display = 'flex';

  const userNames = [];
  for (let i = 0; i < MODE; i++) userNames.push(names[i].trim() || SLOT_LABELS[i]);

  showProgress('Reading exports…', 'parsing ' + MODE + ' ZIPs', 5);
  const raws = await Promise.all(files.slice(0, MODE).map(f => readZip(f)));
  const users = raws.map((raw, i) => ({
    name: userNames[i],
    ratings: normalizeRows(raw.ratings),
    watchlist: normalizeRows(raw.watchlist),
    diary: normalizeRows(raw.diary),
  }));

  users.forEach(u => {
    if (!u.ratings.length && !u.watchlist.length && !u.diary.length) {
      throw new Error(u.name + "'s ZIP did not contain ratings, diary, or watchlist data.");
    }
    u.watchlistMap = buildWatchlistMap(u.watchlist);
    u.watchedSet = buildWatchedSet(u);
  });

  const userModels = users.map(user => {
    const ratedIdx = buildRatedIndex(user.ratings);
    return {
      ratedIdx,
      avg: fallbackAvg(userAvg([...ratedIdx.values()])),
    };
  });

  const sharedCandidates = MODE > 1 ? buildSharedWatchlist(users) : [];
  const sharedKeys = new Set(sharedCandidates.map(c => c.key));
  const unionCandidates = buildUnionWatchlistCandidates(users, users.map(u => u.watchedSet), sharedKeys, MODE);
  const shortlistUnion = unionCandidates.slice(0, MODE === 1 ? 80 : 90);

  showProgress('Building candidate pool…', 'finding watchlist and similar-movie candidates', 12);
  const cache = loadTmdbCache();
  const similarFallback = await buildSimilarFallbackCandidates(users, userModels, cache, MODE);
  const favoriteCandidates = MODE === 2 ? buildFavoriteHandoffCandidates(users, userModels).slice(0, 60) : [];

  const existingKeys = new Set(shortlistUnion.map(c => c.key));
  const fallbackShortlist = similarFallback.filter(c => {
    const byName = (c.title || '').toLowerCase() + '|' + (c.year || '');
    if (existingKeys.has(c.key) || existingKeys.has(byName) || sharedKeys.has(byName)) return false;
    return isUnseenByAll(byName, users.map(u => u.watchedSet));
  });

  const primaryCandidates = MODE === 1 ? [...shortlistUnion, ...fallbackShortlist].slice(0, 90) : sharedCandidates;
  const discoveryCandidates = MODE === 1 ? [] : [...shortlistUnion, ...fallbackShortlist].slice(0, 80);
  const favoritesPool = MODE === 2 ? favoriteCandidates : [];

  const totalToEnrich = primaryCandidates.length + discoveryCandidates.length + favoritesPool.length;
  showProgress('Looking up movie metadata…', totalToEnrich + ' candidates', 18);

  const enrichedPrimary = await enrichCandidates(primaryCandidates, cache, 18, totalToEnrich ? 44 * (primaryCandidates.length / totalToEnrich) : 0, MODE === 1 ? 'Scoring personal picks…' : 'Scoring shared picks…');
  const enrichedDiscovery = await enrichCandidates(discoveryCandidates, cache, 62, totalToEnrich ? 28 * (discoveryCandidates.length / totalToEnrich) : 0, 'Scoring more group picks…');
  const enrichedFavorites = await enrichCandidates(favoritesPool, cache, 90, totalToEnrich ? 8 * (favoritesPool.length / totalToEnrich) : 0, 'Scoring favorite handoffs…');
  saveTmdbCache(cache);

  showProgress('Scoring picks…', 'combining affinity and agreement', 92);

  const scoredPrimary = dedupeScored(enrichedPrimary.map(c => scoreCandidate(c, users, userModels, MODE)).sort((a, b) => b.finalScore - a.finalScore), MODE === 1 ? 24 : 48);
  const scoredDiscovery = dedupeScored(enrichedDiscovery.map(c => scoreCandidate(c, users, userModels, MODE)).sort((a, b) => b.finalScore - a.finalScore), 24);
  const scoredFavorites = dedupeScored(enrichedFavorites.map(c => scoreFavoriteCandidate(c, users, userModels)).sort((a, b) => b.finalScore - a.finalScore), 18);

  showProgress('Done', '', 100);
  await new Promise(r => setTimeout(r, 180));
  renderReport({ users, userModels, sharedCandidates, unionCandidates, scoredPrimary, scoredDiscovery, scoredFavorites });
}

function fmtScore(x) { return x == null ? '—' : x.toFixed(2); }
function fmtRuntime(min) {
  if (!min) return '';
  const h = Math.floor(min / 60), m = min % 60;
  return h ? (m ? h + 'h ' + m + 'm' : h + 'h') : m + 'm';
}
function lbUrl(uri, title, year) {
  if (uri) return uri.startsWith('http') ? uri : 'https://letterboxd.com' + uri;
  const slug = (title || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  return 'https://letterboxd.com/film/' + slug + (year ? '-' + year : '') + '/';
}

function primarySectionTitle(mode) {
  if (mode === 1) return "Movies You'd Probably Like";
  if (mode === 2) return 'Top Picks for Both of You';
  return "Top Picks for All of You";
}

function primarySectionNote(mode) {
  if (mode === 1) return "Ranked from movies on your watchlist plus a few unseen TMDB-similar candidates. Your predicted score comes from similar movies you've rated highly before, with your overall average as the fallback.";
  return 'These are the movies already sitting in every uploaded watchlist. Each title gets a per-person prediction from similarly rated films, then a group score that rewards consensus and punishes big disagreement.';
}

function groupSectionNote(mode) {
  if (mode === 2) return "These are movies that aren't in both watchlists already, and neither person is marked as having watched them. We prefer unseen titles from your combined watchlists first, then add a few TMDB-similar fallbacks if the watchlists are thin.";
  return "These are movies that aren't already on all three watchlists, and nobody in the group is marked as having watched them. The ranking still favors movies all three of you are predicted to like, with a small bonus when someone already saved it.";
}

  } else {

    users.forEach((u, i) => {
      stats.push({ val: u.ratings.length, label: u.name + ' Rated' });

  ).join('');

  if (MODE === 1) {
    groupSection.style.display = 'none';
    favoritesSection.style.display = 'none';
  } else {
    groupSection.style.display = '';
    document.getElementById('group-discovery-title').textContent = "Movies Not In Common But You'd All Probably Like";
    document.getElementById('group-discovery-note').textContent = groupSectionNote(MODE);
    drawPickList('group-discovery-area', scoredDiscovery, users.map(u => u.name), {
      empty: 'Not enough unseen group candidates surfaced from your watchlists or similar films.',

    });

      drawPickList('favorites-area', scoredFavorites, users.map(u => u.name), {
        empty: 'No strong favorite handoff picks surfaced from your ratings yet.',
        max: 12,
      });
    } else {
      favoritesSection.style.display = 'none';
    }
  }

  const listArea = document.getElementById('shared-list-area');
  const listTitle = document.getElementById('library-section-title');
  const listNote = document.getElementById('library-section-note');
  if (MODE === 1) {

    } else {

      listArea.innerHTML = '<div class="shared-list">' + sorted.map((m, i) =>
        `<div class="shared-row">
          <span class="rank">${i + 1}</span>
          <span class="title">${escapeHtml(m.title)}</span>
          <span class="year">${m.year || ''}</span>
          <a href="${lbUrl(m.uri, m.title, m.year)}" target="_blank" rel="noopener">Letterboxd ↗</a>
        </div>`
      ).join('') + '</div>';
    }
  } else {
    listTitle.textContent = 'Full Shared Watchlist';
    listNote.textContent = 'The raw intersection across every uploaded watchlist, before ranking.';
    if (!sharedCandidates.length) {
      listArea.innerHTML = '<div class="empty">No shared watchlist movies.</div>';
    } else {
      const sorted = [...sharedCandidates].sort((a, b) => (a.title || '').localeCompare(b.title || ''));
      listArea.innerHTML = '<div class="shared-list">' + sorted.map((m, i) =>
        `<div class="shared-row">
          <span class="rank">${i + 1}</span>
          <span class="title">${escapeHtml(m.title)}</span>
          <span class="year">${m.year || ''}</span>
          <a href="${lbUrl(m.uri, m.title, m.year)}" target="_blank" rel="noopener">Letterboxd ↗</a>
        </div>`
      ).join('') + '</div>';
    }
  }
}

const FILTER_STATE = { runtime: 'any', cert: 'any', genre: 'any', decade: 'any' };
const CERT_ORDER = ['G', 'PG', 'PG-13', 'R', 'NC-17', 'NR'];

function renderPicksWithFilters(picks, userNames) {
  const filters = document.getElementById('filters');
  const allGenres = new Set();
  const allDecades = new Set();
  picks.forEach(p => {
    (p.genres || []).forEach(g => allGenres.add(g));
    if (p.year) allDecades.add(Math.floor(parseInt(p.year, 10) / 10) * 10);
  });
  const genreList = [...allGenres].sort();
  const decadeList = [...allDecades].sort((a, b) => b - a);

  const opt = (label, val, selected) => `<option value="${escapeHtml(val)}"${val === selected ? ' selected' : ''}>${escapeHtml(label)}</option>`;
  filters.innerHTML = `
    <div class="filter-group">
      <label>Runtime</label>
      <select data-filter="runtime">
        ${['any', '90', '105', '120', '150'].map(v => opt(v === 'any' ? 'Any' : '≤ ' + fmtRuntime(parseInt(v, 10)), v, FILTER_STATE.runtime)).join('')}
      </select>
    </div>
    <div class="filter-group">
      <label>Rated</label>
      <select data-filter="cert">
        ${opt('Any', 'any', FILTER_STATE.cert)}
        ${CERT_ORDER.map(c => opt(c, c, FILTER_STATE.cert)).join('')}
      </select>
    </div>
    <div class="filter-group">
      <label>Genre</label>
      <select data-filter="genre">
        ${opt('Any', 'any', FILTER_STATE.genre)}
        ${genreList.map(g => opt(g, g, FILTER_STATE.genre)).join('')}
      </select>
    </div>
    <div class="filter-group">
      <label>Decade</label>
      <select data-filter="decade">
        ${opt('Any', 'any', FILTER_STATE.decade)}
        ${decadeList.map(d => opt(d + 's', String(d), FILTER_STATE.decade)).join('')}
      </select>
    </div>
    <button class="filter-clear" id="filter-clear">Clear</button>
    <span class="filter-count" id="filter-count"></span>
  `;
  filters.querySelectorAll('select').forEach(sel => {
    sel.addEventListener('change', () => {
      FILTER_STATE[sel.dataset.filter] = sel.value;
      drawFilteredPrimary(picks, userNames);
    });
  });
  document.getElementById('filter-clear').addEventListener('click', () => {
    FILTER_STATE.runtime = FILTER_STATE.cert = FILTER_STATE.genre = FILTER_STATE.decade = 'any';
    renderPicksWithFilters(picks, userNames);
  });
  drawFilteredPrimary(picks, userNames);
}

function applyFilters(picks) {
  return picks.filter(m => {
    if (FILTER_STATE.runtime !== 'any') {
      const max = parseInt(FILTER_STATE.runtime, 10);
      if (!m.runtime || m.runtime > max) return false;
    }
    if (FILTER_STATE.cert !== 'any' && m.certification !== FILTER_STATE.cert) return false;
    if (FILTER_STATE.genre !== 'any' && !(m.genres || []).includes(FILTER_STATE.genre)) return false;
    if (FILTER_STATE.decade !== 'any') {
      const d = Math.floor(parseInt(m.year, 10) / 10) * 10;
      if (String(d) !== FILTER_STATE.decade) return false;
    }
    return true;
  });
}

function drawFilteredPrimary(picks, userNames) {
  const picksArea = document.getElementById('picks-area');
  const countEl = document.getElementById('filter-count');
  if (!picks.length) {
    picksArea.innerHTML = '<div class="empty">No candidates surfaced strongly enough to recommend yet.</div>';
    if (countEl) countEl.textContent = '';
    return;
  }
  const filtered = applyFilters(picks);
  if (countEl) countEl.textContent = filtered.length + ' / ' + picks.length + ' picks';
  if (!filtered.length) {
    picksArea.innerHTML = '<div class="empty">No picks match your filters.</div>';
    return;
  }
  drawPickCards(picksArea, filtered.slice(0, 24), userNames);
}

function drawPickList(targetId, picks, userNames, opts) {
  const area = document.getElementById(targetId);
  if (!picks.length) {
    area.innerHTML = `<div class="empty">${escapeHtml(opts.empty)}</div>`;
    return;
  }
  drawPickCards(area, picks.slice(0, opts.max || 18), userNames);
}

function drawPickCards(targetEl, picks, userNames) {
  targetEl.innerHTML = '<div class="pick-grid">' + picks.map((m, i) => {
    const reason = buildReason(m, userNames);
    const poster = m.poster ? `<img src="${POSTER_BASE}${m.poster}" alt="" loading="lazy" />` : '';
    const scorePills = m.sourceType === 'friend-favorite'
      ? [
          `<span class="score-pill"><span class="star">★</span> ${escapeHtml(userNames[m.sourceOwner])} rated ${fmtScore(m.sourceRating)}</span>`,
          `<span class="score-pill"><span class="star">★</span> ${escapeHtml(userNames[m.targetOwner])} predicted ${fmtScore(m.predictionMeta[0].score)}</span>`,
        ].join('')
      : userNames.map((n, j) =>
          `<span class="score-pill"><span class="star">★</span> ${escapeHtml(n)} ${fmtScore(m.preds[j])}</span>`
        ).join('');
    return `
      <div class="pick-card">
        <div class="poster-wrap">
          ${poster}
          <div class="rank-badge">#${i + 1}</div>
        </div>
        <div class="body">
          <div class="title">${escapeHtml(m.title)}</div>
          <div class="year">${[m.year, fmtRuntime(m.runtime), m.certification].filter(Boolean).join(' • ')}</div>
          <div class="scores">${scorePills}</div>
          <div class="reason">${escapeHtml(reason)}</div>
          <a class="lb-link" href="${lbUrl(m.uri, m.title, m.year)}" target="_blank" rel="noopener">View on Letterboxd ↗</a>
        </div>
      </div>`;
  }).join('') + '</div>';
}

function buildReason(m, userNames) {
  if (m.sourceType === 'friend-favorite') {
    const targetMeta = m.predictionMeta[0];
    const sourceName = userNames[m.sourceOwner];
    const targetName = userNames[m.targetOwner];
    const evidence = [
      `${sourceName} rated this ${fmtScore(m.sourceRating)}★ and ${targetName} has not logged it yet.`,
    ];
    if (m.watchOwners.includes(m.targetOwner)) {
      evidence.push(`${targetName} already saved it to their watchlist.`);
    }
    if (targetMeta.matched.length) {
      const top = targetMeta.matched[0];
      evidence.push(`${targetName} rated "${top.title}" ${fmtScore(top.rating)}★, which is a strong similar-movie signal.`);
    } else {
      evidence.push(`${targetName}'s score falls back more heavily to their overall average because direct overlap was sparse.`);
    }
    return evidence.join(' ');
  }
  const evidence = [];
  m.predictionMeta.forEach((meta, i) => {
    if (!meta.matched.length) {
      evidence.push(userNames[i] + ' had no direct similar-title overlap, so this uses their average rating.');
      return;
    }
    const top = meta.matched[0];
    evidence.push(userNames[i] + ' rated "' + top.title + '" ' + fmtScore(top.rating) + '★.');
  });
  if (m.sourceType === 'watchlist-union' && m.watchOwners && m.watchOwners.length) {
    const owners = m.watchOwners.map(i => userNames[i]).join(', ');
    evidence.unshift(m.watchOwners.length === 1
      ? 'Already saved on ' + owners + "'s watchlist."
      : "Already saved across " + owners + "' watchlists.");
  } else if (m.sourceType === 'tmdb-similar' && m.similarSources && m.similarSources.length) {
    const seed = m.similarSources[0];
    evidence.unshift('Surfaced from TMDB similar movies, starting with ' + seed.ownerName + "'s love of \"" + seed.title + '\".');
  } else if (m.sourceType === 'shared-watchlist') {
    evidence.unshift('In every uploaded watchlist already.');
  }
  const suffix = userNames.length > 1 ? ' Group score rewards high scores for everyone and penalizes disagreement.' : ' Personal score shrinks similar-movie evidence toward your overall average when data is sparse.';
  return evidence.slice(0, 3).join(' ') + suffix;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
</script>
